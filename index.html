<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Raminorahel</title>
        <meta
            name="description"
            content="Sen ve ben birbirimiz için yaratılmışız, seni sonsuza dek seveceğim 💞" />
        <script src="https://cdn.tailwindcss.com"></script>
        <script type="module">
            import "https://esm.sh/for-love-element";
        </script>

        <!-- Google Font: Pacifico (handwriting style) -->
        <link
            href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap"
            rel="stylesheet" />

        <style>
            body {
                font-family: "Segoe UI", sans-serif;
                background: linear-gradient(to right, #ffe4e6, #fdf2f8);
            }
            .title-handwriting {
                font-family: "Pacifico", cursive;
            }
        </style>
    </head>

    <body
        class="min-h-screen flex flex-col items-center justify-center text-center px-4 text-pink-800">
        <!-- Title & Description -->
        <div class="mb-6">
            <h1 class="text-5xl font-bold mb-2 title-handwriting">
                Raminorahel
            </h1>
            <p class="text-lg italic">
                Sen ve ben birbirimiz için yaratılmışız,<br />seni sonsuza dek
                seveceğim 💞
            </p>
        </div>

        <!-- Start Date -->
        <div class="mb-4 text-pink-700 font-semibold text-xl">
            Starting from: July 3, 2025
        </div>

        <!-- Time Elapsed -->
        <div
            class="bg-white bg-opacity-70 rounded-2xl shadow-lg p-6 w-full max-w-md space-y-4">
            <div>
                <h2 class="text-xl font-bold">Detailed Time</h2>
                <p id="detailedTime" class="text-lg mt-1"></p>
            </div>
            <div>
                <h2 class="text-xl font-bold">Total Time</h2>
                <ul class="text-lg mt-1 space-y-1">
                    <li>
                        <strong>Seconds:</strong>
                        <span id="totalSeconds"></span>
                    </li>
                    <li>
                        <strong>Minutes:</strong>
                        <span id="totalMinutes"></span>
                    </li>
                    <li><strong>Days:</strong> <span id="totalDays"></span></li>
                </ul>
            </div>
        </div>

        <!-- Hearts -->
        <for-love></for-love>

        <!-- Script: Time Calculation -->
        <script>
            const startDate = new Date("2025-07-03T00:00:00");

            function updateTime() {
                const now = new Date();
                let delta = Math.floor((now - startDate) / 1000);

                const years = Math.floor(delta / (365.25 * 24 * 3600));
                delta -= Math.floor(years * 365.25 * 24 * 3600);

                const months = Math.floor(delta / (30.44 * 24 * 3600));
                delta -= Math.floor(months * 30.44 * 24 * 3600);

                const days = Math.floor(delta / (24 * 3600));
                delta -= days * 24 * 3600;

                const hours = Math.floor(delta / 3600);
                delta -= hours * 3600;

                const minutes = Math.floor(delta / 60);
                const seconds = delta % 60;

                const nowTotalSeconds = Math.floor((now - startDate) / 1000);
                const nowTotalMinutes = Math.floor(nowTotalSeconds / 60);
                const nowTotalDays = Math.floor(nowTotalSeconds / (3600 * 24));

                document.getElementById(
                    "detailedTime"
                ).textContent = `${years} years : ${months} months : ${days} days : ${hours} hours : ${minutes} minutes : ${seconds} seconds`;

                document.getElementById("totalSeconds").textContent =
                    nowTotalSeconds.toLocaleString();
                document.getElementById("totalMinutes").textContent =
                    nowTotalMinutes.toLocaleString();
                document.getElementById("totalDays").textContent =
                    nowTotalDays.toLocaleString();
            }

            updateTime();
            setInterval(updateTime, 1000);
        </script>
    </body>
</html>
